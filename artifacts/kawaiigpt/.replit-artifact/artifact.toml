kind = "web"
previewPath = "/"
title = "KawaiiGPT"
version = "1.0.0"
id = "artifacts/kawaiigpt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25301

[services.development]
run = "pnpm --filter @workspace/kawaiigpt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kawaiigpt", "run", "build" ]
publicDir = "artifacts/kawaiigpt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25301"
BASE_PATH = "/"
